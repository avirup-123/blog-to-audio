<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Audio Online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #333;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 14px 20px;
      text-align: center;
    }
    .header h1 { color: white; font-size: 1.05em; font-weight: 700; }
    .header p { color: rgba(255,255,255,0.8); font-size: 0.72em; margin-top: 2px; }

    .body { padding: 14px 18px; }

    .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 14px; }
    .tab {
      flex: 1; padding: 8px; border: none; background: none;
      font-size: 0.82em; font-weight: 600; color: #999; cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s;
    }
    .tab.active { color: #667eea; border-bottom-color: #667eea; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    label { display: block; font-size: 0.78em; font-weight: 600; color: #555; margin-bottom: 5px; }

    input[type="url"], textarea {
      width: 100%; padding: 9px 11px;
      border: 2px solid #e0e0e0; border-radius: 7px;
      font-size: 0.85em; font-family: inherit;
      transition: border-color 0.2s; background: #fafafa;
    }
    textarea { resize: none; height: 90px; }
    input[type="url"]:focus, textarea:focus {
      outline: none; border-color: #667eea; background: #fff;
    }

    .char-count { font-size: 0.72em; color: #bbb; margin-top: 3px; text-align: right; }

    .btn-convert {
      width: 100%; margin-top: 10px; padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 7px;
      font-size: 0.88em; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-convert:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-convert:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .loader { display: none; text-align: center; padding: 16px 0 8px; }
    .loader.show { display: block; }
    .spinner {
      border: 3px solid #f0f0f0; border-top: 3px solid #667eea;
      border-radius: 50%; width: 30px; height: 30px;
      animation: spin 0.9s linear infinite; margin: 0 auto 7px;
    }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .loader p { font-size: 0.78em; color: #888; }

    .error {
      display: none; background: #fff0f0; color: #c33;
      padding: 8px 11px; border-radius: 7px; font-size: 0.8em; margin-top: 9px;
    }
    .error.show { display: block; }

    .result {
      display: none; margin-top: 12px;
      background: #f4f0ff; border-radius: 10px; padding: 12px;
    }
    .result.show { display: block; }
    .result-title { font-size: 0.82em; font-weight: 700; color: #333; margin-bottom: 9px; text-align: center; }

    audio { width: 100%; border-radius: 6px; margin-bottom: 9px; }

    .btn-download {
      display: block; width: 100%; padding: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; text-decoration: none; border-radius: 7px;
      font-size: 0.82em; font-weight: 700; text-align: center;
    }

    hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }

    .feedback-label { font-size: 0.78em; font-weight: 600; color: #555; margin-bottom: 5px; }
    textarea.feedback-box { height: 65px; font-size: 0.8em; }

    .btn-feedback {
      width: 100%; margin-top: 7px; padding: 8px;
      background: #333; color: white; border: none;
      border-radius: 7px; font-size: 0.8em; font-weight: 600; cursor: pointer;
    }
    .btn-feedback:hover:not(:disabled) { background: #444; }
    .btn-feedback:disabled { opacity: 0.5; cursor: not-allowed; }

    .feedback-ok {
      display: none; font-size: 0.78em; color: #276749;
      background: #f0fff4; padding: 7px 10px; border-radius: 7px;
      margin-top: 7px; text-align: center;
    }
    .feedback-ok.show { display: block; }

    .footer {
      padding: 8px; text-align: center;
      font-size: 0.68em; color: #ccc; border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎙️ Text to Audio Online</h1>
    <p>Convert any blog to audio instantly</p>
  </div>

  <div class="body">
    <div class="tabs">
      <button class="tab active" id="tabUrl">🔗 Blog URL</button>
      <button class="tab" id="tabText">📝 Paste Text</button>
    </div>

    <!-- URL Tab -->
    <div class="tab-panel active" id="tab-url">
      <label for="blogUrl">Blog or Article URL</label>
      <input type="url" id="blogUrl" placeholder="https://example.com/blog-post" />
      <button class="btn-convert" id="btnUrl">Convert to Audio</button>
      <div class="loader" id="loaderUrl">
        <div class="spinner"></div>
        <p>Fetching and generating audio...</p>
      </div>
      <div class="error" id="errorUrl"></div>
      <div class="result" id="resultUrl">
        <div class="result-title">✅ Audio Ready!</div>
        <audio id="audioUrl" controls></audio>
        <a href="#" id="dlUrl" class="btn-download">📥 Download MP3</a>
      </div>
    </div>

    <!-- Text Tab -->
    <div class="tab-panel" id="tab-text">
      <label for="pasteText">Paste your blog text</label>
      <textarea id="pasteText" placeholder="Paste article text here..."></textarea>
      <div class="char-count"><span id="charCount">0</span> / 5000</div>
      <button class="btn-convert" id="btnText">Convert to Audio</button>
      <div class="loader" id="loaderText">
        <div class="spinner"></div>
        <p>Generating audio...</p>
      </div>
      <div class="error" id="errorText"></div>
      <div class="result" id="resultText">
        <div class="result-title">✅ Audio Ready!</div>
        <audio id="audioText" controls></audio>
        <a href="#" id="dlText" class="btn-download">📥 Download MP3</a>
      </div>
    </div>

    <hr>
    <div class="feedback-label">💬 Share Feedback</div>
    <textarea class="feedback-box" id="feedbackText" placeholder="How was your experience?"></textarea>
    <button class="btn-feedback" id="btnFeedback">Send Feedback</button>
    <div class="feedback-ok" id="feedbackOk">✅ Thanks for your feedback!</div>
  </div>

  <div class="footer">text-to-audio-online.vercel.app</div>
  <script src="popup.js"></script>
</body>
</html>
