<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Audio Online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      padding: 14px 20px;
      text-align: center;
    }
    .header h1 { color: #e2e8f0; font-size: 1.05em; font-weight: 700; }
    .header p { color: #94a3b8; font-size: 0.72em; margin-top: 2px; }

    .body { padding: 14px 18px; }

    .tabs { display: flex; border-bottom: 2px solid #1e293b; margin-bottom: 14px; }
    .tab {
      flex: 1; padding: 8px; border: none; background: none;
      font-size: 0.82em; font-weight: 600; color: #94a3b8; cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s;
      font-family: inherit;
    }
    .tab:hover { color: #e2e8f0; }
    .tab.active { color: #818cf8; border-bottom-color: #818cf8; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    label { display: block; font-size: 0.78em; font-weight: 600; color: #94a3b8; margin-bottom: 5px; }

    input[type="url"], textarea {
      width: 100%; padding: 9px 11px;
      border: 1px solid #334155; border-radius: 7px;
      font-size: 0.85em; font-family: inherit;
      transition: border-color 0.2s; background: #1e293b; color: #e2e8f0;
    }
    textarea { resize: none; height: 90px; }
    input[type="url"]:focus, textarea:focus {
      outline: none; border-color: #818cf8;
    }
    input[type="url"]::placeholder, textarea::placeholder { color: #64748b; }

    .char-count { font-size: 0.72em; color: #64748b; margin-top: 3px; text-align: right; }

    .btn-convert {
      width: 100%; margin-top: 10px; padding: 10px;
      background: #818cf8;
      color: #fff; border: none; border-radius: 7px;
      font-size: 0.88em; font-weight: 700; cursor: pointer; transition: background 0.2s;
      font-family: inherit;
    }
    .btn-convert:hover:not(:disabled) { background: #6366f1; }
    .btn-convert:disabled { background: #475569; cursor: not-allowed; }

    .loader { display: none; text-align: center; padding: 16px 0 8px; }
    .loader.show { display: block; }
    .spinner {
      border: 3px solid #334155; border-top: 3px solid #818cf8;
      border-radius: 50%; width: 30px; height: 30px;
      animation: spin 0.9s linear infinite; margin: 0 auto 7px;
    }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .loader p { font-size: 0.78em; color: #94a3b8; }

    .error {
      display: none; background: #7f1d1d; color: #fecaca;
      padding: 8px 11px; border-radius: 7px; font-size: 0.8em; margin-top: 9px;
    }
    .error.show { display: block; }

    .result {
      display: none; margin-top: 12px;
      background: #1e293b; border-radius: 10px; padding: 12px;
    }
    .result.show { display: block; }
    .result-title { font-size: 0.82em; font-weight: 700; color: #818cf8; margin-bottom: 9px; text-align: center; }

    audio { width: 100%; border-radius: 6px; margin-bottom: 9px; }

    .btn-download {
      display: block; width: 100%; padding: 8px;
      background: #818cf8;
      color: #fff; text-decoration: none; border-radius: 7px;
      font-size: 0.82em; font-weight: 700; text-align: center;
      transition: background 0.2s;
    }
    .btn-download:hover { background: #6366f1; }

    hr { border: none; border-top: 1px solid #1e293b; margin: 12px 0; }

    .feedback-label { font-size: 0.78em; font-weight: 600; color: #94a3b8; margin-bottom: 5px; }
    textarea.feedback-box { height: 65px; font-size: 0.8em; }

    .btn-feedback {
      width: 100%; margin-top: 7px; padding: 8px;
      background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
      border-radius: 7px; font-size: 0.8em; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.2s;
    }
    .btn-feedback:hover:not(:disabled) { background: #253046; }
    .btn-feedback:disabled { opacity: 0.5; cursor: not-allowed; }

    .feedback-ok {
      display: none; font-size: 0.78em; color: #86efac;
      background: #14532d; padding: 7px 10px; border-radius: 7px;
      margin-top: 7px; text-align: center;
    }
    .feedback-ok.show { display: block; }

    .footer {
      padding: 8px; text-align: center;
      font-size: 0.68em; color: #64748b; border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎙️ Text to Audio Online</h1>
    <p>Convert any blog to audio instantly</p>
  </div>

  <div class="body" id="signinScreen" style="display:none; text-align:center; padding-top: 30px;">
    <p style="color:#94a3b8; font-size:0.85em; margin-bottom:14px;">Sign in to convert blogs to audio.</p>
    <button class="btn-convert" id="btnSignIn" style="width:auto; padding: 10px 20px;">Sign in with Google</button>
  </div>

  <div class="body" id="appContent" style="display:none;">
    <div class="topbar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span id="userEmail" style="font-size:0.72em; color:#94a3b8;"></span>
      <button id="btnSignOut" style="background:none; border:none; color:#818cf8; font-size:0.72em; cursor:pointer; font-family:inherit;">Sign out</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabUrl">🔗 Blog URL</button>
      <button class="tab" id="tabText">📝 Paste Text</button>
    </div>

    <!-- URL Tab -->
    <div class="tab-panel active" id="tab-url">
      <label for="blogUrl">Blog or Article URL</label>
      <input type="url" id="blogUrl" placeholder="https://example.com/blog-post" />
      <button class="btn-convert" id="btnUrl">Convert to Audio</button>
      <div class="loader" id="loaderUrl">
        <div class="spinner"></div>
        <p>Fetching and generating audio...</p>
      </div>
      <div class="error" id="errorUrl"></div>
      <div class="result" id="resultUrl">
        <div class="result-title">✅ Audio Ready!</div>
        <audio id="audioUrl" controls></audio>
        <a href="#" id="dlUrl" class="btn-download">📥 Download MP3</a>
      </div>
    </div>

    <!-- Text Tab -->
    <div class="tab-panel" id="tab-text">
      <label for="pasteText">Paste your blog text</label>
      <textarea id="pasteText" placeholder="Paste article text here..."></textarea>
      <div class="char-count"><span id="charCount">0</span> / 5000</div>
      <button class="btn-convert" id="btnText">Convert to Audio</button>
      <div class="loader" id="loaderText">
        <div class="spinner"></div>
        <p>Generating audio...</p>
      </div>
      <div class="error" id="errorText"></div>
      <div class="result" id="resultText">
        <div class="result-title">✅ Audio Ready!</div>
        <audio id="audioText" controls></audio>
        <a href="#" id="dlText" class="btn-download">📥 Download MP3</a>
      </div>
    </div>

  </div>

  <div class="footer">text-to-audio-online.vercel.app</div>
  <script src="popup.js"></script>
</body>
</html>
